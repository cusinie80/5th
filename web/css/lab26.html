<!-- Lab 26: Give an example using CSS Box-sizing property and see the difference between content box(default) and border box. -->
<html>

<head>

    <head>
        <title>CSS Box-Sizing</title>
        <style>
            div {
                width: 200px;
                padding: 20px;
                border: 5px solid;
                margin: 10px;
                background: red;
            }

            .a {
                box-sizing: content-box;
            }

            .b {
                box-sizing: border-box;
            }
        </style>
    </head>

<body>
    <h2>Overflow Property</h2>
    <div class="a">box-sizing: content-box</div>
    <div class="b">box-sizing: border-box</div>

</body>

</html>
