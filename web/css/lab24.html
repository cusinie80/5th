<!-- Lab 24: Make small boxes using HTML elements and CSS. And use CSS float property with the value left or right. -->
<html>

<head>
    <title>CSS Float</title>

    <style>
        div {
            height: 50px;
            width: 50px;
            border: 1px solid black;
            background-color: lightblue;
            margin: 2px;
            float: left;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>
    <div>Box 1</div>
    <div>Box 2</div>
    <div>Box 3</div>
    <div>Box 4</div>
</body>

</html>
