<!-- Lab 29: Give an example using media queries. -->
<html>

<head>
    <title>Media Query</title>

    <style>
        body {
            background: url(Resource/29vince.png);
            background-repeat: no-repeat;
            background-size: contain;
            text-align: center;
        }

        @media (max-width: 900px) {
            body {
                background: url(Resource/29vincer.png);
            }
        }

        @media (max-width: 600px) {
            body {
                background: url(Resource/29vincest.png);
            }
        }
    </style>
</head>

<body>

    <h1>Media Query</h1>
    <p>Background image changes with screen size.</p>

</body>

</html>
