<!-- Lab 19: Give an example using list-style-type, list-style-position and list-style-image. -->
<html>

<head>
    <title>List CSS</title>

    <style>
        ul {
            width: 90px;
        }

        .type li {
            list-style-type: lower-greek;
            list-style-position: inside;

        }

        .image li {
            list-style-image: url('lab19.png');
            list-style-position: outside;
        }
    </style>
</head>

<body>

    <h3>list-style-type Property</h3>
    <ul class="type">
        <li>tea</li>
        <li>coffee</li>
        <li>latte</li>
    </ul>

    <h3>list-style-image Property</h3>
    <ul class="image">
       <li>tea</li>
        <li>coffee</li>
        <li>latte</li>
    </ul>

</body>

</html>
