<!-- Lab 18: Design a webpage like below using css property: -->
<html>

<head>
    <title>Marksheet</title>

    <style>
        table {
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid gray;
            text-align: center;
            padding: 5px 0;
        }

        th {
            background-color: #dfdfdf;
        }

        .even {
            background-color: silver;
        }

        .subjectPercentage {
            padding: 5px 100px;
        }

        #marks {
            padding: 5px 200px;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th rowspan="2" class="subjectPercentage">Subject</th>
            <th colspan="2" id="marks">Marks</th>
            <th rowspan="2" class="subjectPercentage">Percentage</th>
        </tr>
        <tr>
            <th>Obtained</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>Mathematics</td>
            <td>90</td>
            <td>100</td>
            <td>90%</td>
        </tr>
        <tr class="even">
            <td>Science</td>
            <td>85</td>
            <td>100</td>
            <td>85%</td>
        </tr>
        <tr>
            <td>Computer</td>
            <td>85</td>
            <td>100</td>
            <td>85%</td>
        </tr>
        <tr class="even">
            <td>Sociology</td>
            <td>85</td>
            <td>100</td>
            <td>85%</td>
        </tr>
        <tr>
            <td colspan="3">Total</td>
            <td>87.5%</td>
        </tr>
    </table>
</body>

</html>
