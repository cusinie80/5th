<!-- Lab 21: Display a horizontal list of link using CSS display property. -->
<html>

<head>
    <title>CSS Display</title>

    <style>
        li {
            display: inline;
        }
    </style>
</head>

<body>
    <p>Display a list of links as a horizontal menu:</p>
    <ul>
        <li><a href="#">HTML</a></li>
        <li><a href="#">CSS</a></li>
        <li><a href="#">JavaScript</a></li>
    </ul>
</body>

</html>
