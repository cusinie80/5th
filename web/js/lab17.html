<!-- Lab 17: Write a java script program to take size of array, value from user and display the value. -->
<html>
<body>
  Enter array size: <input type="text" id="arrSize" size="20" />
  <button onclick="createArray()">Create Array</button>
  <br/><br/>
  <p id="result"></p>
  <script>
    function createArray() {
      var size = parseInt(document.getElementById("arrSize").value);
      var arr = [];
      for (var i = 0; i < size; i++) {
        var val = prompt("Enter value for element " + (i + 1) + ":");
        arr.push(val);
      }
      document.getElementById("result").innerHTML = "Array: [" + arr.join(", ") + "]";
    }
  </script>
</body>
</html>
