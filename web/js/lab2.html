<!-- Lab 2: Write a program in JavaScript to print an even number only from 1 to 100. -->
<html>
<head>
    <script>
        document.write("Even numbers from 1-100:<br>");
        for (var i = 1; i <= 100; i++)
            if (i % 2 == 0)
                document.write(i + " ");
    </script>
</head>
</html>
