<!-- Lab 10: Write a java script program to demonstrate different string handling function. -->
<html>

<head>
    <title>String Handling Functions</title>

    <script>
        let str = "  My name is ayush.  ";

        document.write("<b>Original String : </b> " + str + "<br><br>");
        document.write("<b>Length : </b> " + str.length + "<br>");

        let trimmed = str.trim();

        document.write("<b>Trimmed : </b> " + trimmed + "<br>");
        document.write("<b>Uppercase : </b> " + trimmed.toUpperCase() + "<br>");
        document.write("<b>Lowercase : </b> " + trimmed.toLowerCase() + "<br>");
        document.write("<b>Substring (0-5) : </b> " + trimmed.substring(0, 5) + "<br>");
        document.write("<b>Slice (7-17) : </b> " + trimmed.slice(7, 17) + "<br>");
        document.write("<b>Replace 'name' with 'nickname' : </b> " + trimmed.replace("name", "nickname") + "<br>");
        document.write("<b>Includes 'ayush' : </b> " + trimmed.includes("ayush") + "<br>");

        let words = trimmed.split(" ");
        document.write("<b>Split into words : </b> " + words + "<br>");

        let newStr = trimmed.concat(" Welcome!");
        document.write("<b>Concatenated String : </b> " + newStr + "<br>");

        document.write("<b>Character at index 8 : </b> " + trimmed.charAt(8) + "<br>");
        document.write("<b>Index of 'h' : </b> " + trimmed.indexOf("h") + "<br>");
    </script>
</head>

</html>
