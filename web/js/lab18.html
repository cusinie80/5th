<!-- Lab 18: Write java script code to create an array that hold the name of 10 students. Convert the array into string and print that array. -->
<html>
<body>
  <button onclick="printStudents()">Print Students</button>
  <p id="result"></p>
  <script>
    function printStudents() {
      var students = ["Ayush", "Bibek", "Suman", "Anita", "Rohan", "Priya", "Kiran", "Sita", "Ram", "Gita"];
      var str = students.toString();
      document.getElementById("result").innerHTML = "Array as String: " + str;
    }
  </script>
</body>
</html>
