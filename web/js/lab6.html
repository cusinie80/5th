<!-- Lab 6: Write a program in JavaScript to take a two number as input from user and calculate sum, difference and multiplication. -->
<html>

<head>
    <title>Sum, Difference & Multiplication of 2 Numbers</title>

    <script>
        var a = parseInt(prompt("Enter 1st number :"));
        var b = parseInt(prompt("Enter 2nd number :"));
        var sum = a + b;
        var diff = a - b;
        var mul = a * b;
        document.write("Sum of " + a + " and " + b + " = " + sum + "<br>");
        document.write("Difference of " + a + " and " + b + " = " + diff + "<br>");
        document.write("Multiplication of " + a + " and " + b + " = " + mul + "<br>");
    </script>
</head>

</html>
