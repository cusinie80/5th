<!-- Lab 22: Create an array of size 10, add some element on it of your choice. Now add any three element at last, remove one element from last, add 3 new element from first position, add 5 new element from position 6 onward, delete any 2 elements from position 2 to 4. Convert final array into string and display the result. -->
<html>
<body>
  <button onclick="runAll()">Run All Operations</button>
  <p id="result"></p>
  <script>
    function runAll() {
      var arr = ["Ayush","Bibek","Suman","Anita","Rohan","Priya","Kiran","Sita","Ram","Gita"];
      var out = "";
      out += "Original: [" + arr + "]<br/>";
      arr.push("Alex","Bob","Clara");
      out += "After push 3 at last: [" + arr + "]<br/>";
      arr.pop();
      out += "After pop 1 from last: [" + arr + "]<br/>";
      arr.unshift("Neo","Zen","Max");
      out += "After unshift 3 at first: [" + arr + "]<br/>";
      arr.splice(6, 0, "E1","E2","E3","E4","E5");
      out += "After splice 5 at pos 6: [" + arr + "]<br/>";
      arr.splice(2, 2);
      out += "After delete 2 from pos 2: [" + arr + "]<br/>";
      out += "Final as String: " + arr.toString();
      document.getElementById("result").innerHTML = out;
    }
  </script>
</body>
</html>
