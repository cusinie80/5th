<!-- Lab 3: You have sequence of number from 1 to hundred but condition is that you have to print only that number which is not divisible by 5. Write a JavaScript code for it. -->
<html>

<head>
    <title>Numbers not Divisible by 5 from 1-100</title>

    <script>
        document.write("Numbers not divisible by 5 from 1-100:<br>");
        for (var i = 1; i <= 100; i++)
            if (i % 5 != 0)
                document.write(i + " ");
    </script>

</html>
