<!-- Lab 1: Write a java script program to demonstrate variable like var, let and const with different datatypes. -->
<html>
<head>
    <title>Variables Demo</title>
</head>
<body>

<script>
    // var example
    var city = "Kathmandu";
    var temp = 25;
    document.write("City: " + city + "<br>Temperature: " + temp + "<br>");

    var city = "Pokhara"; // redeclared
    temp = 22; // reassigned
    document.write("Updated City: " + city + "<br>Updated Temp: " + temp + "<br><br>");

    // let example
    let student = "Aarav";
    let passed = true;
    document.write("Student: " + student + "<br>Passed: " + passed + "<br>");

    student = "Sita"; // reassigned
    document.write("Updated Student: " + student + "<br><br>");

    // const example
    const country = "Nepal";
    const marks = null;
    document.write("Country: " + country + "<br>Marks: " + marks);
</script>

</body>
</html>
